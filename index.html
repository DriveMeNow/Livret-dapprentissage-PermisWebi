<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ── SEO & description ──────────────────────────────── -->
    <meta name="description" content="Livret d'apprentissage numérique Permis Webi — candidats libres au permis de conduire. Conforme REMC." />
    <meta name="robots" content="index, follow" />
    <meta name="color-scheme" content="light" />

    <!-- ── Thème navigateur (Android Chrome + Safari) ──────── -->
    <meta name="theme-color" content="#f8f2e5" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f8f2e5" />

    <!-- ── iOS / iPhone — installation sur l'écran d'accueil ─ -->
    <!-- Active le mode plein écran (sans barre d'adresse Safari) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!-- Barre de statut sur fond clair (crème) -->
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <!-- Nom affiché sous l'icône sur l'écran d'accueil iPhone -->
    <meta name="apple-mobile-web-app-title" content="Mon Livret" />
    <!-- Icône utilisée par iOS pour l'écran d'accueil (sans ça = capture d'écran) -->
    <link rel="apple-touch-icon" sizes="180x180"
          href="https://d1yei2z3i6k35z.cloudfront.net/13456335/687fb09be66ff_logorondfinalvolantcl%C3%A9.png" />
    <link rel="apple-touch-icon" sizes="152x152"
          href="https://d1yei2z3i6k35z.cloudfront.net/13456335/687fb09be66ff_logorondfinalvolantcl%C3%A9.png" />
    <link rel="apple-touch-icon"
          href="https://d1yei2z3i6k35z.cloudfront.net/13456335/687fb09be66ff_logorondfinalvolantcl%C3%A9.png" />

    <!-- ── Android / PWA manifest ───────────────────────────── -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <!-- Icône générique pour navigateurs non-Apple -->
    <link rel="icon" type="image/png" sizes="512x512"
          href="https://d1yei2z3i6k35z.cloudfront.net/13456335/687fb09be66ff_logorondfinalvolantcl%C3%A9.png" />

    <!-- ── Polices ──────────────────────────────────────────── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <title>Mon Livret</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
